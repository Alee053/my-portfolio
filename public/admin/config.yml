# Vercel integration for authentication
backend:
  name: github
  repo: Alee053/my-portfolio
  branch: master
  site_domain: alecastro.dev
  base_url: https://www.alecastro.dev
  auth_endpoint: oauth

display_url: "https://www.alecastro.dev"
logo_url: "https://res.cloudinary.com/dwhzvvrmu/image/upload/f_auto,q_auto/v1758136024/logo_yvmxub.png"

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

media_library:
  name: cloudinary
  config:
    cloud_name: dwhzvvrmu
    api_key: 189752686927554

collections:
  # Blog Posts Collection
  - name: "blog"
    label: "Blog Posts"
    folder: "src/content/blog"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Tags", name: "tags", widget: "list", default: [] }
      - { label: "Repository URL", name: "repo_url", widget: "string", required: false }
      - { label: "Body", name: "body", widget: "markdown" }

  # Projects Collection
  - name: "projects"
    label: "Projects"
    folder: "src/content/projects"
    create: true
    slug: "{{slug}}"
    extension: "yaml"
    format: "yaml"
    fields:
      - { label: "Name", name: "name", widget: "string" }
      - { label: "Subtitle", name: "subtitle", widget: "string" }
      - { label: "Year", name: "year", widget: "number" }
      - { label: "Repository URL", name: "repo_url", widget: "string", required: false }
      - { label: "Blog Post Slug", name: "blog_slug", widget: "string", required: false, hint: "Slug of related blog post (e.g., 'ai2048' for ai2048.md)" }
      - { label: "Demo URL", name: "demo_url", widget: "string", required: false }
      - { label: "Tags", name: "tags", widget: "list", default: [] }
      - { label: "Order", name: "order", widget: "number", required: false, default: 99 }